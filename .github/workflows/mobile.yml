name: 'Build Mobile App (Debug)'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Create the release exactly once before the builds start ──────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: get version
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "tag=app-v${VERSION}" >> $GITHUB_OUTPUT

      - name: create release
        run: |
          gh release view "${{ steps.version.outputs.tag }}" 2>/dev/null || \
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "App v$(jq -r '.version' src-tauri/tauri.conf.json)" \
            --notes "See the assets to download this version and install."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Android debug — unsigned APK uploaded to the release
  # ---------------------------------------------------------------------------
  build-android:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install Android NDK r27
        run: sdkmanager "ndk;27.0.12077973"

      - name: install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm i

      - name: init Tauri Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        with:
          mobile: android
          args: --debug

      - name: upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.release_tag }}
        run: |
          find src-tauri/gen/android -name "*.apk" | while IFS= read -r f; do
            gh release upload "$TAG" "$f" --clobber
          done

  # ---------------------------------------------------------------------------
  # iOS debug — unsigned build uploaded to the release
  # ---------------------------------------------------------------------------
  build-ios:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: install frontend dependencies
        run: npm i

      - name: init Tauri iOS project
        run: npx tauri ios init

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mobile: ios
          args: --debug

      - name: upload iOS build to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.release_tag }}
        run: |
          BIN_NAME=$(grep '^name = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

          # Prefer a signed IPA; fall back to zipping the .app bundle
          IPA=$(find src-tauri/gen/apple -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            gh release upload "$TAG" "$IPA" --clobber
          else
            APP=$(find src-tauri/gen/apple/build -name "*.app" -maxdepth 6 2>/dev/null | head -1)
            if [ -n "$APP" ]; then
              ZIP="${BIN_NAME}_${VERSION}_ios-debug.zip"
              zip -r "$ZIP" "$APP"
              gh release upload "$TAG" "$ZIP" --clobber
            else
              echo "No iOS artifacts found under src-tauri/gen/apple"
              find src-tauri/gen/apple 2>/dev/null | head -30
              exit 1
            fi
          fi
