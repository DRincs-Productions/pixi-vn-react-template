name: 'Build Mobile App (Debug)'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Android debug — unsigned APK, available as a workflow artifact
  # ---------------------------------------------------------------------------
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install Android NDK r27
        run: sdkmanager "ndk;27.0.12077973"

      - name: install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install frontend dependencies
        run: yarn install

      - name: init Tauri Android project
        run: yarn tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        with:
          mobile: android
          args: --debug

      - name: upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ---------------------------------------------------------------------------
  # iOS debug — unsigned IPA for simulator, available as a workflow artifact
  # ---------------------------------------------------------------------------
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: install frontend dependencies
        run: yarn install

      - name: init Tauri iOS project
        run: yarn tauri ios init

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mobile: ios
          args: --debug

      - name: upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug
          path: src-tauri/gen/apple/build/**/*.ipa
